<div style="margin-bottom:14px;">
  <label class="edit-label">Асуулт</label>
  <input type="text" class="input-box eq-text" id="eqtext_{{ q.id }}" value="{{ q.text }}" placeholder="Асуулт">
</div>
<div style="margin-bottom:14px;">
  <label class="edit-label">Төрөл</label>
  <div class="type-grid" id="etypegrid_{{ q.id }}">
    <div class="type-opt {% if q.question_type=='single' %}selected{% endif %}" data-val="single" onclick="selectEditType({{ q.id }},'single')">⦿ Нэг сонголт</div>
    <div class="type-opt {% if q.question_type=='multiple' %}selected{% endif %}" data-val="multiple" onclick="selectEditType({{ q.id }},'multiple')">☑ Олон сонголт</div>
    <div class="type-opt {% if q.question_type=='rating' %}selected{% endif %}" data-val="rating" onclick="selectEditType({{ q.id }},'rating')">★ Үнэлгээ</div>
    <div class="type-opt {% if q.question_type=='text' %}selected{% endif %}" data-val="text" onclick="selectEditType({{ q.id }},'text')">✏ Текст</div>
  </div>
</div>
<div id="eoptSection_{{ q.id }}" style="margin-bottom:14px;{% if q.question_type in ('rating','text') %}display:none{% endif %}">
  <label class="edit-label">Сонголтууд</label>
  <div id="eoptList_{{ q.id }}">
    {% for opt in q.get_options() %}
    <div class="opt-row">
      <span style="color:var(--blue);font-size:.8rem;">—</span>
      <input type="text" class="input-box eq-opt" value="{{ opt }}" style="padding:8px 12px;">
      <button class="opt-del" onclick="this.closest('.opt-row').remove()">×</button>
    </div>
    {% endfor %}
  </div>
  <button class="btn btn-text" style="padding:6px 0;font-size:.72rem;margin-top:4px;color:var(--blue);" onclick="addEditOpt({{ q.id }})">+ Сонголт нэмэх</button>
</div>
<div style="display:flex;gap:10px;align-items:center;margin-top:16px;">
  <button class="btn btn-primary" style="padding:9px 20px;font-size:.75rem;" onclick="saveQ({{ q.id }})">Хадгалах</button>
  <button class="btn btn-ghost" style="padding:9px 16px;font-size:.75rem;" onclick="cancelEdit({{ q.id }})">Цуцлах</button>
  <div style="flex:1;"></div>
  <button class="icon-btn danger" onclick="deleteQ({{ q.id }},event)" title="Устгах">✕</button>
</div>
