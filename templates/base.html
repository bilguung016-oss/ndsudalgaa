<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Судалгаа{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --bg2:      #111111;
      --bg3:      #1a1a1a;
      --border:   #2a2a2a;
      --border2:  #333333;
      --text:     #f0ede8;
      --muted:    #888880;
      --gold:     #c9a96e;
      --gold2:    #e8c988;
      --white:    #ffffff;
      --danger:   #c0392b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,8,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex; align-items: center;
      padding: 0 32px; gap: 16px;
    }
    .topbar-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text);
    }
    .topbar-logo-icon {
      width: 28px; height: 28px; border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; color: var(--gold); font-family: 'Playfair Display', serif;
      letter-spacing: .05em;
    }
    .topbar-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text);
    }
    .topbar-spacer { flex: 1; }
    .topbar-link {
      font-size: .78rem; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; text-decoration: none;
      color: var(--muted); transition: color .2s; background: none;
      border: none; cursor: pointer; font-family: inherit; padding: 6px 12px;
    }
    .topbar-link:hover { color: var(--text); }
    .topbar-link.active {
      color: var(--gold); border-bottom: 1px solid var(--gold);
    }

    /* ── Page ── */
    .page { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
    .page.wide { max-width: 1100px; }

    /* ── Section title ── */
    .section-eyebrow {
      font-size: .7rem; font-weight: 600; letter-spacing: .2em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 10px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; font-weight: 400; color: var(--text);
      line-height: 1.2; margin-bottom: 8px;
    }
    .section-sub {
      font-size: .88rem; color: var(--muted); margin-bottom: 32px;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 32px;
      margin-bottom: 12px;
      position: relative;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%; background: var(--gold);
      opacity: 0; transition: opacity .2s;
    }
    .card:focus-within::before { opacity: 1; }
    .card-header {
      border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 24px;
    }
    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 400; color: var(--text); line-height: 1.3;
    }
    .card-header .desc {
      font-size: .88rem; color: var(--muted); margin-top: 8px; line-height: 1.7;
    }
    .card-header .required-note {
      font-size: .72rem; color: var(--gold); margin-top: 16px;
      letter-spacing: .05em;
    }

    /* ── Question block ── */
    .question-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      padding: 28px 32px;
      margin-bottom: 10px;
      transition: border-color .2s;
    }
    .question-block:focus-within { border-left-color: var(--gold); }
    .question-label {
      font-size: .95rem; font-weight: 400; color: var(--text);
      margin-bottom: 18px; line-height: 1.6;
    }
    .question-num {
      font-size: .65rem; font-weight: 600; letter-spacing: .15em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
    }
    .required-star { color: var(--gold); margin-left: 3px; }

    /* ── Options ── */
    .opt-item {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 14px; cursor: pointer;
      border: 1px solid transparent;
      transition: border-color .15s, background .15s; margin-bottom: 4px;
    }
    .opt-item:hover { border-color: var(--border2); background: var(--bg3); }
    .opt-item input[type=radio],
    .opt-item input[type=checkbox] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; border: 1px solid var(--border2);
      cursor: pointer; flex-shrink: 0; transition: all .15s;
      background: transparent; position: relative;
    }
    .opt-item input[type=radio] { border-radius: 50%; }
    .opt-item input[type=radio]:checked {
      border-color: var(--gold); border-width: 5px;
      background: var(--bg2);
    }
    .opt-item input[type=checkbox]:checked {
      background: var(--gold); border-color: var(--gold);
    }
    .opt-item input[type=checkbox]:checked::after {
      content: ''; position: absolute; left: 3px; top: 0;
      width: 5px; height: 9px;
      border: 1.5px solid var(--bg); border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .opt-item span { font-size: .88rem; color: var(--text); user-select: none; }

    /* ── Stars ── */
    .star-group { display: flex; flex-direction: row-reverse; gap: 6px; margin-top: 10px; }
    .star-group input { display: none; }
    .star-group label {
      font-size: 2rem; cursor: pointer; color: var(--border2);
      transition: color .12s; line-height: 1;
    }
    .star-group label:hover,
    .star-group label:hover ~ label,
    .star-group input:checked ~ label { color: var(--gold); }

    /* ── Inputs ── */
    .gf-input {
      width: 100%; padding: 10px 0; background: transparent;
      border: none; border-bottom: 1px solid var(--border2);
      font-size: .9rem; font-family: inherit; color: var(--text);
      outline: none; transition: border-color .2s;
    }
    .gf-input:focus { border-bottom-color: var(--gold); }
    .gf-input::placeholder { color: var(--muted); }

    .input-box {
      width: 100%; padding: 10px 14px;
      background: var(--bg3); border: 1px solid var(--border);
      font-size: .88rem; font-family: inherit; color: var(--text);
      outline: none; transition: border-color .2s; border-radius: 1px;
    }
    .input-box:focus { border-color: var(--gold); }
    .input-box::placeholder { color: var(--muted); }

    textarea.input-box { resize: vertical; min-height: 80px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 28px; font-size: .78rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      font-family: inherit; cursor: pointer; text-decoration: none;
      transition: all .2s; border-radius: 1px; border: none;
    }
    .btn-gold {
      background: var(--gold); color: var(--bg);
    }
    .btn-gold:hover { background: var(--gold2); }
    .btn-outline {
      background: transparent; color: var(--gold);
      border: 1px solid var(--gold);
    }
    .btn-outline:hover { background: rgba(201,169,110,.08); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
    .btn-danger-ghost {
      background: transparent; color: var(--danger);
      border: none; padding: 10px 16px;
    }
    .btn-danger-ghost:hover { background: rgba(192,57,43,.08); }
    .btn-text {
      background: transparent; color: var(--muted); border: none;
      padding: 10px 16px; letter-spacing: .08em;
    }
    .btn-text:hover { color: var(--text); }

    /* ── Tags / chips ── */
    .tag {
      display: inline-flex; align-items: center;
      padding: 3px 10px; font-size: .68rem;
      font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      border-radius: 1px;
    }
    .tag-gold { background: rgba(201,169,110,.12); color: var(--gold); border: 1px solid rgba(201,169,110,.25); }
    .tag-green { background: rgba(34,197,94,.08); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
    .tag-red { background: rgba(192,57,43,.08); color: #f87171; border: 1px solid rgba(192,57,43,.2); }
    .tag-blue { background: rgba(99,102,241,.08); color: #818cf8; border: 1px solid rgba(99,102,241,.2); }
    .tag-purple { background: rgba(168,85,247,.08); color: #c084fc; border: 1px solid rgba(168,85,247,.2); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ── Icon btn ── */
    .icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      color: var(--muted); font-size: .9rem;
      transition: all .15s; border-radius: 1px;
    }
    .icon-btn:hover { border-color: var(--border2); color: var(--text); }
    .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Sub-question ── */
    .sub-block {
      display: none; margin: 10px 0 0 24px;
      background: var(--bg3); border: 1px solid var(--border);
      border-left: 2px solid var(--gold); padding: 20px 24px;
    }
    .sub-block.visible { display: block; }
    .sub-trigger-label {
      font-size: .65rem; font-weight: 600; letter-spacing: .15em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Alert ── */
    .alert {
      padding: 12px 16px; font-size: .85rem; margin-bottom: 16px;
      border-left: 3px solid;
    }
    .alert-error { background: rgba(192,57,43,.08); border-color: var(--danger); color: #f87171; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="topbar">
    <a href="/" class="topbar-logo">
      <div class="topbar-logo-icon">S</div>
      <span class="topbar-logo-text">Судалгаа</span>
    </a>
    <div class="topbar-spacer"></div>
    {% block topbar_actions %}
    <a href="/" class="topbar-link">Нүүр</a>
    <a href="/admin" class="topbar-link active">Админ</a>
    {% endblock %}
  </nav>
  {% block body %}
  <div class="page">
    {% block content %}{% endblock %}
  </div>
  {% endblock %}
</body>
</html>
