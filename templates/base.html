<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Судалгаа{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      background: #f0ebf8;
      color: #202124;
      min-height: 100vh;
    }

    /* Top nav bar */
    .gf-topbar {
      position: sticky; top: 0; z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      height: 64px;
      display: flex; align-items: center; padding: 0 24px;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .gf-topbar .logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #5f6368;
    }
    .gf-topbar .logo svg { width: 32px; height: 32px; }
    .gf-topbar .logo-text { font-size: 1.25rem; color: #5f6368; font-weight: 400; }
    .gf-topbar .spacer { flex: 1; }
    .gf-topbar .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 4px;
      text-decoration: none; font-size: .875rem; font-weight: 500;
      border: none; cursor: pointer; background: transparent;
      color: #5f6368; transition: background .15s;
    }
    .gf-topbar .nav-btn:hover { background: #f1f3f4; }
    .gf-topbar .nav-btn.primary {
      background: #673ab7; color: #fff; border-radius: 4px;
    }
    .gf-topbar .nav-btn.primary:hover { background: #5e35b1; }

    /* Page container */
    .gf-page { max-width: 770px; margin: 0 auto; padding: 24px 16px 64px; }
    .gf-page.wide { max-width: 960px; }

    /* Cards */
    .gf-card {
      background: #fff;
      border-radius: 8px;
      border-top: 10px solid #673ab7;
      box-shadow: 0 2px 1px -1px rgba(0,0,0,.1), 0 1px 1px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.06);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .gf-card.flat { border-top: none; }
    .gf-card-body { padding: 24px; }
    .gf-card:focus-within { border-left: 6px solid #673ab7; border-top: none; padding-left: 0; }

    /* Question card */
    .gf-question {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 1px -1px rgba(0,0,0,.1), 0 1px 1px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.06);
      margin-bottom: 12px;
      padding: 24px;
      border-left: 6px solid transparent;
      transition: border-color .2s;
    }
    .gf-question:focus-within { border-left-color: #673ab7; }

    /* Survey header card */
    .gf-header-card {
      background: #fff;
      border-radius: 8px;
      border-top: 10px solid #673ab7;
      box-shadow: 0 2px 1px -1px rgba(0,0,0,.1), 0 1px 1px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.06);
      padding: 24px;
      margin-bottom: 12px;
    }
    .gf-header-card h1 { font-size: 2rem; font-weight: 400; color: #202124; }
    .gf-header-card .desc { font-size: .9rem; color: #5f6368; margin-top: 8px; line-height: 1.6; }
    .gf-header-card .required-note { font-size: .8rem; color: #d93025; margin-top: 12px; }

    /* Form elements */
    .gf-label { font-size: 1rem; font-weight: 400; color: #202124; margin-bottom: 12px; display: block; line-height: 1.5; }
    .gf-required { color: #d93025; margin-left: 3px; }

    /* Radio / Checkbox options */
    .gf-option {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 4px; cursor: pointer;
      border-radius: 4px; transition: background .12s;
      position: relative;
    }
    .gf-option:hover { background: #f1f3f4; }
    .gf-option input[type=radio],
    .gf-option input[type=checkbox] {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px; border: 2px solid #5f6368;
      cursor: pointer; flex-shrink: 0; transition: border-color .15s;
      position: relative;
    }
    .gf-option input[type=radio] { border-radius: 50%; }
    .gf-option input[type=checkbox] { border-radius: 2px; }
    .gf-option input[type=radio]:checked { border-color: #673ab7; border-width: 6px; }
    .gf-option input[type=checkbox]:checked {
      background: #673ab7; border-color: #673ab7;
    }
    .gf-option input[type=checkbox]:checked::after {
      content: ''; position: absolute; left: 3px; top: 0px;
      width: 6px; height: 10px;
      border: 2px solid #fff; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .gf-option span { font-size: .9rem; color: #202124; user-select: none; }

    /* Text input - Google Forms underline style */
    .gf-input {
      width: 100%; padding: 8px 0; border: none;
      border-bottom: 1px solid #dadce0; font-size: .9rem;
      font-family: inherit; color: #202124; background: transparent;
      outline: none; transition: border-color .2s;
    }
    .gf-input:focus { border-bottom: 2px solid #673ab7; }
    .gf-input::placeholder { color: #bdc1c6; }

    .gf-textarea {
      width: 100%; padding: 8px 0; border: none;
      border-bottom: 1px solid #dadce0; font-size: .9rem;
      font-family: inherit; color: #202124; background: transparent;
      outline: none; resize: vertical; min-height: 80px;
      transition: border-color .2s;
    }
    .gf-textarea:focus { border-bottom: 2px solid #673ab7; }

    /* Admin text inputs (boxed) */
    .gf-input-box {
      width: 100%; padding: 10px 12px;
      border: 1px solid #dadce0; border-radius: 4px;
      font-size: .9rem; font-family: inherit; color: #202124;
      outline: none; transition: border-color .2s;
    }
    .gf-input-box:focus { border-color: #673ab7; box-shadow: 0 0 0 2px rgba(103,58,183,.15); }

    /* Star rating */
    .gf-stars { display: flex; gap: 4px; margin-top: 8px; }
    .gf-stars input { display: none; }
    .gf-stars label {
      font-size: 2.2rem; cursor: pointer; color: #dadce0;
      transition: color .1s; font-weight: 400; line-height: 1;
    }
    .gf-stars:hover label { color: #f59e0b; }
    .gf-stars label:hover ~ label { color: #dadce0; }
    .gf-stars input:checked ~ label { color: #dadce0; }
    .gf-stars input:checked + label,
    .gf-stars input:checked ~ label:not(input:checked ~ label ~ label) { color: #f59e0b; }
    /* simpler approach */
    .star-group { display: flex; flex-direction: row-reverse; gap: 4px; margin-top:8px; }
    .star-group input { display: none; }
    .star-group label { font-size: 2.2rem; cursor: pointer; color: #dadce0; transition: color .1s; }
    .star-group label:hover,
    .star-group label:hover ~ label,
    .star-group input:checked ~ label { color: #f59e0b; }

    /* Buttons */
    .gf-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 24px; border-radius: 4px; border: none;
      cursor: pointer; font-size: .875rem; font-weight: 500;
      font-family: inherit; text-decoration: none;
      transition: background .15s, box-shadow .15s;
    }
    .gf-btn-primary { background: #673ab7; color: #fff; }
    .gf-btn-primary:hover { background: #5e35b1; box-shadow: 0 2px 6px rgba(103,58,183,.35); }
    .gf-btn-text { background: transparent; color: #673ab7; padding: 10px 16px; }
    .gf-btn-text:hover { background: rgba(103,58,183,.06); }
    .gf-btn-danger { background: transparent; color: #d93025; padding: 8px 14px; }
    .gf-btn-danger:hover { background: rgba(217,48,37,.06); }
    .gf-btn-outlined {
      background: transparent; color: #673ab7;
      border: 1px solid #673ab7; padding: 9px 23px;
    }
    .gf-btn-outlined:hover { background: rgba(103,58,183,.06); }
    .gf-btn-grey { background: #f1f3f4; color: #5f6368; }
    .gf-btn-grey:hover { background: #e8eaed; }

    /* Chips/badges */
    .gf-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 16px; font-size: .78rem; font-weight: 500;
    }
    .gf-chip-green { background: #e6f4ea; color: #137333; }
    .gf-chip-red { background: #fce8e6; color: #c5221f; }
    .gf-chip-blue { background: #e8f0fe; color: #1967d2; }
    .gf-chip-purple { background: #f3e8fd; color: #7b1fa2; }

    /* Divider */
    .gf-divider { height: 1px; background: #e0e0e0; margin: 16px 0; }

    /* Error */
    .gf-error { color: #d93025; font-size: .8rem; margin-top: 4px; }
    .gf-alert { padding: 12px 16px; border-radius: 4px; font-size: .9rem; margin-bottom: 16px; }
    .gf-alert-error { background: #fce8e6; color: #c5221f; border-left: 4px solid #d93025; }

    /* Tooltip / hint */
    .gf-hint { font-size: .8rem; color: #80868b; margin-top: 4px; }

    /* Icon button */
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: transparent; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      color: #5f6368; font-size: 1.1rem; transition: background .15s;
    }
    .icon-btn:hover { background: #f1f3f4; }

    /* Progress bar (for survey) */
    .gf-progress { height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
    .gf-progress-fill { height: 100%; background: #673ab7; border-radius: 2px; transition: width .4s; }

    /* Floating submit row */
    .gf-submit-row { display: flex; align-items: center; gap: 12px; padding: 8px 0 16px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="gf-topbar">
    <a href="/" class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="4" width="36" height="40" rx="4" fill="#673ab7"/>
        <rect x="12" y="14" width="24" height="3" rx="1.5" fill="white" opacity=".9"/>
        <rect x="12" y="21" width="24" height="3" rx="1.5" fill="white" opacity=".9"/>
        <rect x="12" y="28" width="16" height="3" rx="1.5" fill="white" opacity=".9"/>
      </svg>
      <span class="logo-text">Судалгаа</span>
    </a>
    <div class="spacer"></div>
    {% block topbar_actions %}
    <a href="/" class="nav-btn">Нүүр</a>
    <a href="/admin" class="nav-btn primary">Админ</a>
    {% endblock %}
  </nav>
  {% block body %}
  <div class="gf-page">
    {% block content %}{% endblock %}
  </div>
  {% endblock %}
</body>
</html>
