<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Судалгаа{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #015197;
      --blue2:   #0166c0;
      --red:     #C4272F;
      --red2:    #e0333c;
      --gold:    #D4A843;
      --bg:      #ffffff;
      --bg2:     #f7f9fc;
      --bg3:     #eef2f7;
      --text:    #0d1b2e;
      --text2:   #344155;
      --muted:   #6b7a93;
      --border:  #dde3ed;
      --shadow:  rgba(1,81,151,.10);
      --shadow2: rgba(1,81,151,.18);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      height: 64px;
      display: flex; align-items: center; padding: 0 32px; gap: 16px;
      box-shadow: 0 2px 20px rgba(1,81,151,.06);
    }
    .topbar-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .topbar-logo-text {
      font-family:'Playfair Display',serif; font-size:1.1rem;
      font-weight:600; color:var(--blue); letter-spacing:.02em;
    }
    .topbar-spacer { flex:1; }
    .topbar-link {
      font-size:.75rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
      text-decoration:none; color:var(--muted); background:none; border:none;
      cursor:pointer; font-family:inherit; padding:8px 14px;
      border-radius:6px; transition:all .2s;
    }
    .topbar-link:hover { color:var(--blue); background:rgba(1,81,151,.06); }
    .topbar-link.primary {
      background:var(--blue); color:#fff;
      box-shadow:0 4px 14px rgba(1,81,151,.3);
    }
    .topbar-link.primary:hover { background:var(--blue2); }

    /* ── Page ── */
    .page { max-width:780px; margin:0 auto; padding:48px 24px 80px; }
    .page.wide { max-width:1060px; }

    /* ── 3D Card ── */
    .card-3d {
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 16px;
      box-shadow:
        0 1px 2px rgba(0,0,0,.04),
        0 4px 12px rgba(1,81,151,.06),
        0 12px 32px rgba(1,81,151,.08),
        0 0 0 1px rgba(1,81,151,.03);
      transition: transform .25s, box-shadow .25s;
      position: relative;
      overflow: hidden;
    }
    .card-3d::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg, var(--blue), var(--red));
    }
    .card-3d:hover {
      transform: translateY(-2px);
      box-shadow:
        0 2px 4px rgba(0,0,0,.04),
        0 8px 24px rgba(1,81,151,.10),
        0 24px 48px rgba(1,81,151,.10),
        0 0 0 1px rgba(1,81,151,.04);
    }

    /* ── Question block ── */
    .q-block {
      background:#fff; border-radius:12px; padding:28px 32px;
      border:1px solid var(--border); margin-bottom:10px;
      box-shadow:0 2px 12px rgba(1,81,151,.05), 0 1px 2px rgba(0,0,0,.03);
      border-left:4px solid transparent; transition:border-color .2s, box-shadow .2s;
    }
    .q-block:focus-within {
      border-left-color: var(--blue);
      box-shadow:0 4px 20px rgba(1,81,151,.12), 0 1px 2px rgba(0,0,0,.03);
    }
    .q-eyebrow {
      font-size:.65rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
      color:var(--blue); margin-bottom:8px;
    }
    .q-label { font-size:.95rem; color:var(--text); line-height:1.6; margin-bottom:18px; }
    .required-star { color:var(--red); margin-left:3px; }

    /* ── Options ── */
    .opt-item {
      display:flex; align-items:center; gap:14px; padding:11px 16px;
      border-radius:8px; cursor:pointer; border:1.5px solid transparent;
      transition:all .15s; margin-bottom:4px;
    }
    .opt-item:hover { background:rgba(1,81,151,.04); border-color:rgba(1,81,151,.15); }
    .opt-item input[type=radio],
    .opt-item input[type=checkbox] {
      appearance:none; -webkit-appearance:none; width:20px; height:20px;
      border:2px solid var(--border); cursor:pointer; flex-shrink:0;
      transition:all .15s; background:#fff; position:relative;
    }
    .opt-item input[type=radio] { border-radius:50%; }
    .opt-item input[type=radio]:checked { border-color:var(--blue); border-width:6px; }
    .opt-item input[type=checkbox]:checked { background:var(--blue); border-color:var(--blue); }
    .opt-item input[type=checkbox]:checked::after {
      content:''; position:absolute; left:4px; top:1px;
      width:6px; height:10px; border:2px solid #fff;
      border-top:none; border-left:none; transform:rotate(45deg);
    }
    .opt-item span { font-size:.9rem; color:var(--text2); user-select:none; }

    /* ── Stars ── */
    .star-group { display:flex; flex-direction:row-reverse; gap:6px; margin-top:8px; }
    .star-group input { display:none; }
    .star-group label { font-size:2.2rem; cursor:pointer; color:var(--border); transition:color .1s; line-height:1; }
    .star-group label:hover,
    .star-group label:hover ~ label,
    .star-group input:checked ~ label { color:var(--gold); }

    /* ── Inputs ── */
    .gf-input {
      width:100%; padding:10px 0; background:transparent;
      border:none; border-bottom:2px solid var(--border);
      font-size:.9rem; font-family:inherit; color:var(--text);
      outline:none; transition:border-color .2s;
    }
    .gf-input:focus { border-bottom-color:var(--blue); }
    .gf-input::placeholder { color:var(--muted); }

    .input-box {
      width:100%; padding:11px 14px; background:var(--bg2);
      border:1.5px solid var(--border); border-radius:8px;
      font-size:.9rem; font-family:inherit; color:var(--text);
      outline:none; transition:border-color .2s, box-shadow .2s;
    }
    .input-box:focus {
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(1,81,151,.1);
      background:#fff;
    }
    .input-box::placeholder { color:var(--muted); }
    textarea.input-box { resize:vertical; min-height:80px; }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:11px 24px; font-size:.8rem; font-weight:600;
      letter-spacing:.06em; font-family:inherit; cursor:pointer;
      text-decoration:none; transition:all .2s; border:none; border-radius:8px;
    }
    .btn-primary {
      background:var(--blue); color:#fff;
      box-shadow:0 4px 14px rgba(1,81,151,.35);
    }
    .btn-primary:hover { background:var(--blue2); box-shadow:0 6px 20px rgba(1,81,151,.4); transform:translateY(-1px); }
    .btn-red {
      background:var(--red); color:#fff;
      box-shadow:0 4px 14px rgba(196,39,47,.3);
    }
    .btn-red:hover { background:var(--red2); }
    .btn-outline {
      background:transparent; color:var(--blue);
      border:2px solid var(--blue);
    }
    .btn-outline:hover { background:rgba(1,81,151,.06); }
    .btn-ghost {
      background:var(--bg2); color:var(--text2);
      border:1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color:var(--blue); color:var(--blue); }
    .btn-text { background:transparent; color:var(--muted); }
    .btn-text:hover { color:var(--blue); }
    .btn-danger { background:transparent; color:var(--red); border:1.5px solid rgba(196,39,47,.25); }
    .btn-danger:hover { background:rgba(196,39,47,.06); }

    /* ── Tags ── */
    .tag {
      display:inline-flex; align-items:center;
      padding:3px 10px; font-size:.68rem; font-weight:600;
      letter-spacing:.08em; text-transform:uppercase; border-radius:20px;
    }
    .tag-blue { background:rgba(1,81,151,.08); color:var(--blue); }
    .tag-red { background:rgba(196,39,47,.08); color:var(--red); }
    .tag-green { background:rgba(22,163,74,.08); color:#15803d; }
    .tag-gold { background:rgba(212,168,67,.12); color:#92650a; }
    .tag-purple { background:rgba(124,58,237,.08); color:#6d28d9; }

    /* ── Icon btn ── */
    .icon-btn {
      width:36px; height:36px; border-radius:8px;
      border:1.5px solid var(--border); background:#fff;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; color:var(--muted); font-size:.85rem;
      transition:all .15s;
    }
    .icon-btn:hover { border-color:var(--blue); color:var(--blue); }
    .icon-btn.danger:hover { border-color:var(--red); color:var(--red); }

    /* ── Divider ── */
    .divider { height:1px; background:var(--border); margin:24px 0; }

    /* ── Sub-question ── */
    .sub-block {
      display:none; margin:12px 0 0 24px;
      background:rgba(1,81,151,.03); border-radius:10px;
      border:1.5px solid rgba(1,81,151,.15);
      border-left:3px solid var(--blue); padding:20px 24px;
    }
    .sub-block.visible { display:block; animation:slideIn .2s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
    .sub-trigger-label {
      font-size:.65rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
      color:var(--blue); margin-bottom:10px; display:flex; align-items:center; gap:6px;
    }

    /* ── Alert ── */
    .alert { padding:12px 16px; border-radius:8px; font-size:.85rem; margin-bottom:16px; }
    .alert-error { background:rgba(196,39,47,.06); border:1px solid rgba(196,39,47,.2); color:var(--red); }

    /* ── Mongolia map SVG decoration ── */
    .mongolia-deco {
      position:absolute; right:-20px; bottom:-30px;
      width:320px; height:160px; opacity:.06; pointer-events:none;
    }
    .mongolia-deco-large {
      position:absolute; right:0; top:50%; transform:translateY(-50%);
      width:500px; height:280px; opacity:.04; pointer-events:none;
    }

    /* ── 3D float animation ── */
    @keyframes float3d {
      0%,100% { transform:translateY(0) rotateX(0deg); }
      50% { transform:translateY(-6px) rotateX(1deg); }
    }
    .float-anim { animation:float3d 5s ease-in-out infinite; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="topbar">
    <a href="/" class="topbar-logo">
      <!-- Soyombo-inspired logo -->
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="var(--blue)"/>
        <!-- Flame -->
        <path d="M18 5 C18 5 16 8 18 10 C20 8 18 5 18 5Z" fill="var(--gold)"/>
        <!-- Sun -->
        <circle cx="18" cy="13" r="2.5" fill="var(--gold)"/>
        <!-- Moon -->
        <path d="M14.5 11.5 A3.5 3.5 0 0 0 14.5 14.5 A2.5 2.5 0 0 1 14.5 11.5Z" fill="var(--gold)"/>
        <!-- Top bar -->
        <rect x="11" y="17" width="14" height="1.5" rx=".75" fill="white"/>
        <!-- Yin-yang bars -->
        <rect x="12" y="20" width="12" height="1.5" rx=".75" fill="white"/>
        <rect x="13" y="23" width="10" height="1.5" rx=".75" fill="white"/>
        <!-- Bottom bar -->
        <rect x="11" y="27" width="14" height="1.5" rx=".75" fill="var(--red)"/>
        <!-- Side triangles -->
        <path d="M11 18.5 L11 26.5 L9 22.5 Z" fill="var(--gold)"/>
        <path d="M25 18.5 L25 26.5 L27 22.5 Z" fill="var(--gold)"/>
      </svg>
      <span class="topbar-logo-text">НД Судалгаа</span>
    </a>
    <div class="topbar-spacer"></div>
    {% block topbar_actions %}
    <a href="/" class="topbar-link">Нүүр</a>
    <a href="/admin" class="topbar-link primary">Админ</a>
    {% endblock %}
  </nav>
  {% block body %}
  <div class="page">
    {% block content %}{% endblock %}
  </div>
  {% endblock %}
</body>
</html>
