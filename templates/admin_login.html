{% extends "base.html" %}
{% block title %}Нэвтрэх{% endblock %}
{% block topbar_actions %}<a href="/" class="topbar-link">← Нүүр</a>{% endblock %}
{% block content %}
<div style="max-width:380px; margin:80px auto;">
  <div class="section-eyebrow" style="text-align:center;">Систем</div>
  <h2 style="font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:400; text-align:center; margin-bottom:40px;">Нэвтрэх</h2>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div style="margin-bottom:20px;">
      <label style="font-size:.7rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:8px;">Нууц үг</label>
      <input type="password" name="password" class="input-box" placeholder="••••••••" autofocus required>
    </div>
    <button type="submit" class="btn btn-gold" style="width:100%; justify-content:center;">Нэвтрэх</button>
  </form>
</div>
{% endblock %}
