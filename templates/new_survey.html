{% extends "base.html" %}
{% block title %}Шинэ судалгаа{% endblock %}
{% block topbar_actions %}
<a href="/admin/dashboard" class="topbar-link">← Буцах</a>
{% endblock %}
{% block content %}
<div style="max-width:560px;padding-top:32px;">
  <div style="font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;">Шинэ судалгаа</div>
  <h1 style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;color:var(--text);margin-bottom:32px;">Судалгаа үүсгэх</h1>

  <div class="card-3d">
    <form method="POST">
      <div style="margin-bottom:22px;">
        <label style="font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;">
          Гарчиг <span style="color:var(--red);">*</span>
        </label>
        <input type="text" name="title" class="input-box" placeholder="Судалгааны нэр" required autofocus style="font-size:1rem;padding:13px 16px;">
      </div>
      <div style="margin-bottom:32px;">
        <label style="font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;">
          Тайлбар
        </label>
        <textarea name="description" class="input-box" rows="3" placeholder="Судалгааны зорилго, товч тайлбар…"></textarea>
      </div>
      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary">Үргэлжлүүлэх →</button>
        <a href="/admin/dashboard" class="btn btn-ghost">Цуцлах</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
