{% extends "base.html" %}
{% block title %}Шинэ судалгаа{% endblock %}
{% block topbar_actions %}
<a href="/admin/dashboard" class="topbar-link">← Буцах</a>
{% endblock %}
{% block content %}
<div style="max-width:560px; padding-top:48px;">
  <div class="section-eyebrow">Шинэ</div>
  <h1 class="section-title">Судалгаа үүсгэх</h1>
  <div class="divider"></div>

  <form method="POST" style="margin-top:32px;">
    <div style="margin-bottom:24px;">
      <label style="font-size:.7rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:8px;">
        Гарчиг <span style="color:var(--gold);">*</span>
      </label>
      <input type="text" name="title" class="input-box" placeholder="Судалгааны нэр" required autofocus style="font-size:1rem; padding:14px;">
    </div>
    <div style="margin-bottom:36px;">
      <label style="font-size:.7rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:8px;">
        Тайлбар
      </label>
      <textarea name="description" class="input-box" rows="3" placeholder="Судалгааны зорилго…"></textarea>
    </div>
    <div style="display:flex; gap:12px;">
      <button type="submit" class="btn btn-gold">Үргэлжлүүлэх →</button>
      <a href="/admin/dashboard" class="btn btn-ghost">Цуцлах</a>
    </div>
  </form>
</div>
{% endblock %}
